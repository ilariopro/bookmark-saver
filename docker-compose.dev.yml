include:
  - ./docker-compose.prod.yml

services:

  # ==============
  # Application
  # ==============

  api:
    build:
      context: ./api
      dockerfile: Dockerfile.dev
    environment:
      SPRING_DEVTOOLS_RESTART_ENABLED: "true"
      SPRING_PROFILES_ACTIVE: dev
    volumes:
      - ./api/src:/app/src
      - ./api/pom.xml:/app/pom.xml

  web:
    build:
      context: ./web
      dockerfile: Dockerfile.dev
    environment:
      NODE_ENV: development
    ports:
      - "4200:4200"
    volumes:
      - ./web/src:/app/src

  # ==============
  # Keycloak
  # ==============

  keycloak:
    command: start-dev # no TLS required in dev mode
    environment:
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"

  # ==============
  # Tools
  # ==============

  adminer:
    container_name: bookmark_saver_adminer
    environment:
      ADMINER_DESIGN: pokorny
    image: adminer:latest
    ports:
      - "8888:8080"
    restart: on-failure
