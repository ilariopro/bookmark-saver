<div class="sidebar-content">
  <div class="section-header">
    <h3 class="sidebar-section-title">Lists</h3>
    <button mat-icon-button class="section-add-btn"
            matTooltip="New list"
            (click)="openCreateListDialog()">
      <mat-icon>add</mat-icon>
    </button>
  </div>

  <mat-selection-list
    [multiple]="false"
    [hideSingleSelectionIndicator]="true"
    (click)="onListClick()"
    (selectionChange)="onListChange($event.options[0].value)">

    @for (list of state.lists(); track list.id) {
      <mat-list-option
        class="sidebar-list-item"
        [value]="list.id"
        [selected]="state.selectedListKey() === list.id">

        <div class="list-item-row">
          <mat-icon class="list-item-icon">
            {{ list.icon }}
          </mat-icon>
          <span class="list-item-label">{{ list.name }}</span>
          @if (list.type === 'api') {
            <div class="list-item-actions" [class.hidden]="!isEdit()">
              <button mat-icon-button class="list-action-btn"
                      (click)="$event.stopPropagation(); openEditListDialog(list)"
                      matTooltip="Rename">
                <mat-icon>edit</mat-icon>
              </button>
              <button mat-icon-button class="list-action-btn"
                      (click)="$event.stopPropagation(); openDeleteListDialog(list)"
                      matTooltip="Delete">
                <mat-icon>delete</mat-icon>
              </button>
            </div>
          }
        </div>

      </mat-list-option>
    }
  </mat-selection-list>
  
  <mat-divider />
  
  <div class="section-header">
    <h3 class="sidebar-section-title">Tags</h3>
    <button mat-icon-button class="section-add-btn"
            matTooltip="New tag"
            (click)="openCreateTagDialog()">
      <mat-icon>add</mat-icon>
    </button>
  </div>
  
  <mat-chip-listbox
      class="sidebar-tag-list mat-mdc-chip-set-stacked"
      multiple
      [value]="state.selectedTagIdsArray()"
      (change)="onTagsChange($event)">
  
      @for (tag of state.tags(); track tag.id) {
        <mat-chip-option class="sidebar-tag-item" [value]="tag.id">
          {{ tag.name }}
  
          @if (isEdit()) {
            <button matChipRemove
                    (click)="$event.stopPropagation(); openEditTagDialog(tag)"
                    matTooltip="Rename">
              <mat-icon>edit</mat-icon>
            </button>
          }
  
          @if (isEdit()) {
            <button matChipRemove
                    (click)="$event.stopPropagation(); openDeleteTagDialog(tag)"
                    matTooltip="Delete">
              <mat-icon>delete</mat-icon>
            </button>
          }
  
        </mat-chip-option>
      }
  </mat-chip-listbox>
</div>

<!-- Edit mode toggle -->
<div class="sidebar-footer">
  <button mat-stroked-button class="edit-mode-btn" (click)="toggleEditMode()">
    <mat-icon>{{ isEdit() ? 'check' : 'edit' }}</mat-icon>
    {{ isEdit() ? 'Done' : 'Edit' }}
  </button>
</div>
