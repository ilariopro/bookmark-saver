<h2 mat-dialog-title>Delete Bookmark</h2>

<p class="bookmark-url">{{ url }}</p>

<mat-dialog-content class="dialog-content">
    <p class="confirm-message">{{ description }}</p>
</mat-dialog-content>

<mat-dialog-actions class="action-buttons" align="end">
    <button mat-button (click)="cancel()">Cancel</button>
    <button mat-flat-button color="warn" (click)="confirm()">Delete</button>
</mat-dialog-actions>
