<h2 mat-dialog-title>{{ 'Add Tags' }}</h2>

<mat-dialog-content class="dialog-content">
    @if (state.tags().length === 0) {
        <p class="empty-hint">No tags available.</p>
    } @else {
        <mat-chip-listbox multiple
                            class="mat-mdc-chip-set-stacked"
                            [value]="selectedTagIds"
                            (change)="onTagsChange($event)">
            @for (tag of state.tags(); track tag.id) {
                <mat-chip-option [value]="tag.id">{{ tag.name }}</mat-chip-option>
            }
        </mat-chip-listbox>
    }
</mat-dialog-content>

<mat-dialog-actions align="end">
    <button mat-button (click)="cancel()">Cancel</button>
    <button mat-flat-button color="primary" (click)="save()">Add</button>
</mat-dialog-actions>
