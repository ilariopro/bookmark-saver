<h2 mat-dialog-title>{{ isEdit() ? 'Edit Tag' : 'New Tag' }}</h2>

<mat-dialog-content class="dialog-content">

    <mat-form-field appearance="outline" class="full-width">
        <mat-label>Tag name</mat-label>
        <input
            matInput
            placeholder="Enter a name..."
            [matAutocomplete]="auto"
            [ngModel]="name()"
            (ngModelChange)="onNameChange($event)"
            (keydown.enter)="save()"/>
        
            <mat-autocomplete #auto="matAutocomplete">
                @for (tag of suggestions(); track tag.id) {
                    <mat-option [value]="tag.name">{{ tag.name }}</mat-option>
                }
            </mat-autocomplete>
    </mat-form-field>

    @if (isMatch()) {
        <div class="merge-warning">
            <mat-icon>warning</mat-icon>
            <span>
                <strong>"{{ name().trim() }}"</strong> already exists.
                @if (isEdit()) {
                    All bookmarks will be merged into it. This cannot be undone.
                }
            </span>
        </div>
    }

</mat-dialog-content>

<mat-dialog-actions class="action-buttons" align="end">
    <button mat-button (click)="cancel()">Cancel</button>
    <button
        mat-flat-button
        color="primary"
        [disabled]="!canSave()"
        (click)="save()">
        Save
    </button>
</mat-dialog-actions>
