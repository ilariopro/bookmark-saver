<h2 mat-dialog-title>{{ isEdit() ? 'Edit Tag' : 'New Tag' }}</h2>

<form [formGroup]="form" (ngSubmit)="save()">
    <mat-dialog-content class="dialog-content">

        <!-- Name -->
        <mat-form-field appearance="outline" class="full-width">
            <mat-label>Tag name</mat-label>
            <input 
                matInput
                placeholder="Enter a name..."
                formControlName="name"
                (keydown.enter)="save()"/>

            @if (form.get('name')?.touched && form.get('name')?.invalid) {
                <mat-error>{{ nameError }}</mat-error>
            }
        </mat-form-field>

        <!-- Nesting -->
        <mat-form-field appearance="outline" class="full-width">
            <mat-label>Nested in</mat-label>
            <input matInput
                placeholder="None"
                [ngModel]="parentSearch()"
                [ngModelOptions]="{ standalone: true }"
                (ngModelChange)="parentSearch.set($event)"
                [matAutocomplete]="parentAuto" />

            @if (form.value.parentId) {
                <button mat-icon-button type="button"
                    matSuffix
                    matTooltip="Remove Parent"
                    (click)="clearParent()">
                    <mat-icon>close</mat-icon>
                </button>
            }

            <mat-autocomplete #parentAuto (optionSelected)="onParentSelected($event)">
                @for (item of parentSuggestions(); track item.tag.id) {
                    <mat-option [value]="item.fullPath">{{ item.fullPath }}</mat-option>
                }
            </mat-autocomplete>
        </mat-form-field>
        
        <!-- Appearance -->
        <div class="section-header">
            <h3 class="section-label">Appearance</h3>

            <mat-chip-set class="tag-preview">
                <mat-chip
                    disableRipple="true"
                    [style.--mdc-chip-elevated-container-color]="form.value.backgroundColor ?? null"
                    [style.--mdc-chip-label-text-color]="form.value.textColor ?? null">
                    {{ form.value.name || 'Preview' }}
                </mat-chip>
            </mat-chip-set>
        </div>

        <div class="appearance-section">
            <div class="color-fields">
                <label class="color-row">
                    <span class="color-label">Background Color</span>
                    <input type="color"
                        class="color-input"
                        formControlName="backgroundColor"
                        [value]="form.value.backgroundColor" />
                </label>

                <label class="color-row">
                    <span class="color-label">Text Color</span>
                    <input type="color"
                        class="color-input"
                        formControlName="textColor"
                        [value]="form.value.textColor" />
                </label>
            </div>

            <button mat-stroked-button class="color-reset" type="button" (click)="resetColors()">
                <mat-icon>format_color_reset</mat-icon>
                Reset to default
            </button>
        </div>

    </mat-dialog-content>
    
    <mat-dialog-actions class="action-buttons" align="end">
        <button mat-button type="button" (click)="cancel()">Cancel</button>
        <button mat-flat-button color="primary" type="submit">Save</button>
    </mat-dialog-actions>
</form>
