<h2 mat-dialog-title>Edit Tags</h2>

<mat-dialog-content class="dialog-content">

    @if (state.tags().length === 0) {
        <p class="empty-hint">No tags available.</p>
    } @else {
        <div class="tag-list">
            <div class="checkbox-group">
                @for (tag of state.tags(); track tag.id) {
                    <mat-checkbox
                        color="primary"
                        [indeterminate]="isIndeterminate(tag.id)"
                        [checked]="isChecked(tag.id)"
                        (change)="onChange(tag.id)">
                        {{ tag.name }}
                    </mat-checkbox>
                }
            </div>
        </div>
    }

</mat-dialog-content>

<mat-dialog-actions class="action-buttons" align="end">
    <button mat-button (click)="cancel()">Cancel</button>
    <button mat-flat-button
        color="primary"
        (click)="save()">
        Save
    </button>
</mat-dialog-actions>
