services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: bookmark_saver_app
    depends_on:
      - postgres
    env_file:
      - .env
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod

  postgres:
    image: postgres:16
    container_name: bookmark_saver_db
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
