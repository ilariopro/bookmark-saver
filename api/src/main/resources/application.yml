auth:
  enabled: ${AUTH_ENABLED:false}

spring:
  application:
    name: bookmark-saver

  datasource:
    url: jdbc:${DATABASE_URL}
    username: ${DATABASE_USER}
    password: ${DATABASE_PASSWORD}

  flyway:
    enabled: true
    locations: classpath:database/migrations

  jpa:
    hibernate:
      ddl-auto: validate

  mvc:
    throw-exception-if-no-handler-found: true

  web:
    resources:
      add-mappings: false

server:
  error:
    whitelabel:
      enabled: false
