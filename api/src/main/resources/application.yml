auth:
  enabled: ${AUTH_ENABLED:false}

cors:
  origins: ${APP_WEB_URL}

spring:
  application:
    name: bookmark-saver

  datasource:
    url: jdbc:${DATABASE_URL}
    username: ${DATABASE_USER}
    password: ${DATABASE_PASSWORD}

  flyway:
    enabled: true
    locations: classpath:database/migrations

  jpa:
    hibernate:
      ddl-auto: validate

  mvc:
    throw-exception-if-no-handler-found: true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${OAUTH2_ISSUER_URI:}
          jwk-set-uri: ${OAUTH2_JWK_SET_URI:}
          audiences: ${OAUTH2_AUDIENCES:}
        roles-claim: ${OAUTH2_ROLES_CLAIM:}

  web:
    resources:
      add-mappings: false

server:
  error:
    whitelabel:
      enabled: false
